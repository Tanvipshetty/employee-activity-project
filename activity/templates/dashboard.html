<!DOCTYPE html>
<html>
<head>
    <title>Employee Dashboard</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 0;
        }

        .container {
            width: 60%;
            margin: 40px auto;
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            color: #4e73df;
            margin-bottom: 10px;
        }

        h3 {
            margin-top: 30px;
            color: #333;
        }

        label {
            font-weight: bold;
        }

        input, textarea {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            margin-bottom: 15px;
            border-radius: 5px;
            border: 1px solid #ccc;
            font-size: 14px;
        }

        input:focus, textarea:focus {
            border-color: #4e73df;
            outline: none;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #4e73df;
            border: none;
            color: white;
            font-size: 15px;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #2e59d9;
        }

        .report-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            padding: 10px;
            background: #1cc88a;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            width: 50%;
            margin-left: auto;
            margin-right: auto;
        }

        .report-link:hover {
            background: #17a673;
        }
    </style>
</head>

<body>

<div class="container">

    <h2>Welcome {{ employee.name }}</h2>
    <hr>

    <h3>Submit Weekly Activity Report</h3>

    <form method="post">
        {% csrf_token %}

        <label>Select Date:</label>
        <input type="date" name="date" required>

        <label>Current Week Activity:</label>
        <textarea name="current_week_activity" rows="4" required></textarea>

        <label>Next Week Activity:</label>
        <textarea name="next_week_activity" rows="4" required></textarea>

        <label>Leave Taken:</label>
        <input type="text" name="leave_taken">

        <label>Remarks:</label>
        <textarea name="remarks" rows="3"></textarea>

        <button type="submit">Submit Report</button>
    </form>

    <a href="{% url 'my_reports' %}" class="report-link">
        View My Reports
    </a>

</div>

</body>
</html>
